# Tenant values template — generated by create-tenant.sh
# Placeholders are replaced by sed during tenant creation.
# Configure DOMAIN, CERTIFICATE_ARN, COGNITO_* in create-tenant.sh or env vars.

tenant:
  name: "{{TENANT}}"

fullnameOverride: "openclaw-{{TENANT}}"

ingress:
  enabled: true
  host: "{{TENANT}}.{{DOMAIN}}"
  certificateArn: "{{CERTIFICATE_ARN}}"
  cognito:
    enabled: true
    userPoolArn: "{{COGNITO_POOL_ARN}}"
    clientId: "{{COGNITO_CLIENT_ID}}"
    domain: "{{COGNITO_DOMAIN}}"

config:
  agents:
    list:
      - id: main
        default: true
        identity:
          name: "{{TENANT_DISPLAY_NAME}}"
          emoji: "{{TENANT_EMOJI}}"

skills:
{{SKILLS_YAML}}

# --- Override per tenant as needed ---
# budget:
#   monthlyUsd: {{BUDGET_USD}}
# resources:
#   limits:
#     cpu: 4
#     memory: 4Gi

# Gateway API routing (path-based, replaces Ingress)
gateway:
  enabled: true
  gatewayName: openclaw-gateway
  gatewayNamespace: openclaw-system
  cognito:
    userPoolArn: "{{COGNITO_POOL_ARN}}"
    clientId: "{{COGNITO_CLIENT_ID}}"
    domain: "{{COGNITO_DOMAIN}}"
