# Tenant values reference — example values for helm template dry-run.
# Not used by create-tenant.sh (which adds ApplicationSet elements directly).

tenant:
  name: "{{TENANT}}"

fullnameOverride: "openclaw-{{TENANT}}"

ingress:
  enabled: true
  host: "{{TENANT}}.{{DOMAIN}}"
  certificateArn: "{{CERTIFICATE_ARN}}"

config:
  agents:
    list:
      - id: main
        default: true
        identity:
          name: "{{TENANT_DISPLAY_NAME}}"
          emoji: "{{TENANT_EMOJI}}"

skills:
{{SKILLS_YAML}}

# --- Override per tenant as needed ---
# budget:
#   monthlyUsd: {{BUDGET_USD}}
# resources:
#   limits:
#     cpu: 4
#     memory: 4Gi

# Gateway API routing (path-based, replaces Ingress)
gateway:
  enabled: true
  gatewayName: openclaw-gateway
  gatewayNamespace: openclaw-system
