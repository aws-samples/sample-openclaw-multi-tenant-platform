# Per-tenant values override example
# Usage: ./scripts/create-tenant.sh alice --values helm/values-alice.yaml

ingress:
  enabled: true
  host: "alice.<YOUR_DOMAIN>"
  certificateArn: "arn:aws:acm:us-west-2:<AWS_ACCOUNT_ID>:certificate/<ACM_CERTIFICATE_ID>"
  cognito:
    enabled: true
    userPoolArn: "arn:aws:cognito-idp:us-west-2:<AWS_ACCOUNT_ID>:userpool/<COGNITO_POOL_ID>"
    clientId: "<COGNITO_CLIENT_ID>"
    domain: "<COGNITO_DOMAIN>"

# Override resources per tenant if needed
# resources:
#   limits:
#     cpu: 4
#     memory: 4Gi

# Override model config per tenant
# config:
#   agents:
#     defaults:
#       model:
