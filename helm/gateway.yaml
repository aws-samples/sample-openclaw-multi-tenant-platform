apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: openclaw-alb
spec:
  controllerName: gateway.k8s.aws/alb
---
apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: openclaw-lb-config
  namespace: openclaw-system
spec:
  scheme: internet-facing
  securityGroupPrefixes:
    # CloudFront managed prefix list — region-specific, injected by deploy-platform.sh
    - "CF_PREFIX_LIST_ID"
  manageBackendSecurityGroupRules: true
  loadBalancerAttributes:
    - key: idle_timeout.timeout_seconds
      value: "120"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openclaw-gateway
  namespace: openclaw-system
spec:
  gatewayClassName: openclaw-alb
  infrastructure:
    parametersRef:
      kind: LoadBalancerConfiguration
      name: openclaw-lb-config
      group: gateway.k8s.aws
  listeners:
    - name: https
      hostname: "DOMAIN"
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
