apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
data:
  openclaw.json: |
    {{- $config := deepCopy .Values.config }}
    {{- if and .Values.ingress.enabled .Values.ingress.host }}
    {{- $origin := printf "https://%s" .Values.ingress.host }}
    {{- $_ := set $config.gateway.controlUi "allowedOrigins" (list $origin) }}
    {{- end }}
{{ $config | toJson | indent 4 }}
  bash_aliases: |
    alias openclaw='node /app/dist/index.js'
  fetch-secret.mjs: |
{{ .Values.fetchSecret | indent 4 }}
