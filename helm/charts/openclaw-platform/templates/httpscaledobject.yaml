{{- if .Values.scaleToZero.enabled }}
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ required "ingress.host is required when scaleToZero is enabled" .Values.ingress.host }}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: {{ include "openclaw-helm.fullname" . }}
    kind: Deployment
    apiVersion: apps/v1
    service: {{ include "openclaw-helm.fullname" . }}
    port: {{ .Values.service.port }}
  replicas:
    min: {{ .Values.scaleToZero.minReplicas | default 0 }}
    max: {{ .Values.scaleToZero.maxReplicas | default 1 }}
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: 1
      window: {{ printf "%ds" (int (.Values.scaleToZero.idleTimeout | default 900)) }}
{{- end }}
