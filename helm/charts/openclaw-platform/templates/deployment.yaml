apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "openclaw-helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-helm.selectorLabels" . | nindent 8 }}
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
    spec:
      serviceAccountName: {{ include "openclaw-helm.fullname" . }}
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-config
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw
          cp /config/openclaw.json /home/node/.openclaw/openclaw.json
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
      
      - name: init-skills
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw/workspace/skills
          cd /home/node/.openclaw/workspace
          {{- range .Values.skills }}
          if [ ! -d "skills/{{ . }}" ]; then
            npx -y clawhub install "{{ . }}" --no-input || true
          fi
          {{- end }}
        env:
        - name: HOME
          value: /tmp
        - name: NPM_CONFIG_CACHE
          value: /tmp/.npm
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp

      - name: init-tools
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
        command: ["sh", "-c"]
        args:
          - |
            mkdir -p /home/node/.openclaw/workspace/bin
            if [ ! -f /home/node/.openclaw/workspace/node_modules/@aws-sdk/client-secrets-manager/dist-cjs/index.js ]; then
              cd /home/node/.openclaw/workspace && npm install --no-save @aws-sdk/client-secrets-manager 2>/dev/null
            fi
            # Patch @smithy/credential-provider-imds: add EKS Pod Identity Agent IP (169.254.170.23)
            # to GREENGRASS_HOSTS. Without this, fromContainerMetadata rejects the Pod Identity endpoint.
            # Only patch workspace copy (writable PVC). /app is read-only (image layer) and cannot be
            # modified with readOnlyRootFilesystem.
            IMDS_FILE=/home/node/.openclaw/workspace/node_modules/@smithy/credential-provider-imds/dist-cjs/index.js
            if [ -f "$IMDS_FILE" ] && ! grep -q "169.254.170.23" "$IMDS_FILE"; then
              sed -i 's/"127.0.0.1": true,/"127.0.0.1": true, "169.254.170.23": true,/' "$IMDS_FILE"
            fi
            cp /config/fetch-secret.mjs /home/node/.openclaw/workspace/bin/fetch-secret.mjs
            chmod 700 /home/node/.openclaw/workspace/bin/fetch-secret.mjs
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
      
      containers:
      - name: main
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        command:
        - node
        - dist/index.js
        args:
        - gateway
        - --port
        - "18789"
        - --bind
        - lan
        ports:
        - containerPort: 18789
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        env:
        - name: TENANT_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_PATH
          value: /home/node/.openclaw/workspace/node_modules
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        envFrom:
        - secretRef:
            name: {{ include "openclaw-helm.fullname" . }}-gateway-token
            optional: true
        {{- with .Values.envFrom }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
        - name: bash-aliases
          mountPath: /home/node/.bash_aliases
          subPath: bash_aliases
      
      volumes:
      - name: config
        configMap:
          name: {{ include "openclaw-helm.fullname" . }}
      - name: bash-aliases
        configMap:
          name: {{ include "openclaw-helm.fullname" . }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "openclaw-helm.fullname" . }}
      - name: tmp
        emptyDir: {}
