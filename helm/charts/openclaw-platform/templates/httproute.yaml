{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.gatewayName | default "openclaw-gateway" }}
      namespace: {{ .Values.gateway.gatewayNamespace | default "openclaw-system" }}
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /t/{{ .Values.tenant.name }}
      {{- if and .Values.gateway.cognito.enabled .Values.gateway.cognito.userPoolArn }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.k8s.aws
            kind: ListenerRuleConfiguration
            name: {{ include "openclaw-helm.fullname" . }}-cognito
      {{- end }}
      backendRefs:
        - name: {{ include "openclaw-helm.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
