{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.gatewayName | default "openclaw-gateway" }}
      namespace: {{ .Values.gateway.gatewayNamespace | default "openclaw-system" }}
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /t/{{ .Values.tenant.name }}
      backendRefs:
        {{- if .Values.scaleToZero.enabled }}
        # Route through KEDA interceptor for scale-from-zero.
        # Interceptor counts requests, scales backend, then proxies.
        # Requires ReferenceGrant in keda namespace (created by Operator).
        - name: keda-add-ons-http-interceptor-proxy
          namespace: keda
          port: 8080
        {{- else }}
        - name: {{ include "openclaw-helm.fullname" . }}
          port: {{ .Values.service.port }}
        {{- end }}
{{- end }}
