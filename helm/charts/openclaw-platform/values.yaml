image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.3.24"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

service:
  type: ClusterIP
  port: 18789

persistence:
  enabled: true
  storageClass: "gp3"
  size: 10Gi

serviceAccount:
  annotations: {}

ingress:
  enabled: false
  className: alb
  host: ""
  annotations:
    alb.ingress.kubernetes.io/group.name: openclaw-shared
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

networkPolicy:
  enabled: true

resourceQuota:
  enabled: true
  cpu: "4"
  memory: 8Gi
  pods: "10"

config:
  gateway:
    port: 18789
    mode: local
    controlUi:
      allowedOrigins:
        - "*"
    trustedProxies:
      - "10.0.0.1"
  
  browser:
    enabled: false
  
  agents:
    defaults:
      workspace: /home/node/.openclaw/workspace
      userTimezone: UTC
      timeoutSeconds: 600
      maxConcurrent: 1
      model:
        primary: amazon-bedrock/us.anthropic.claude-opus-4-6-v1
        fallbacks:
          - amazon-bedrock/us.anthropic.claude-sonnet-4-6
          - amazon-bedrock/deepseek.v3.2
      models:
        amazon-bedrock/us.anthropic.claude-opus-4-6-v1:
          alias: opus
          params:
            maxTokens: 16384
            cacheRetention: long
            thinking: adaptive
        amazon-bedrock/us.anthropic.claude-sonnet-4-6:
          alias: sonnet
          params:
            maxTokens: 8192
            cacheRetention: long
            thinking: adaptive
        amazon-bedrock/openai.gpt-oss-120b-1:0:
          params:
            maxTokens: 4096
        amazon-bedrock/qwen.qwen3-coder-480b-a35b-v1:0:
          params:
            maxTokens: 8192
        amazon-bedrock/moonshot.kimi-k2-thinking:
          params:
            maxTokens: 8192
        amazon-bedrock/deepseek.v3.2:
          params:
            maxTokens: 8192
    list:
      - id: main
        default: true
        identity:
          name: OpenClaw
          emoji: "🦞"

  models:
    bedrockDiscovery:
      enabled: true
      region: us-west-2
  
  session:
    scope: per-sender
    store: /home/node/.openclaw/sessions
    reset:
      mode: idle
      idleMinutes: 60
  
  logging:
    level: info
    consoleLevel: info
    consoleStyle: compact
    redactSensitive: tools
  
  tools:
    profile: full
    web:
      search:
        enabled: false
      fetch:
        enabled: true

  secrets:
    providers:
      aws-sm:
        source: exec
        command: /usr/local/bin/node
        args:
          - /home/node/.openclaw/workspace/bin/fetch-secret.mjs
        timeoutMs: 10000
        passEnv:
          - AWS_CONTAINER_CREDENTIALS_FULL_URI
          - AWS_CONTAINER_AUTHORIZATION_TOKEN
          - AWS_REGION
          - TENANT_NAMESPACE
          - NODE_PATH

skills:
  - weather
  - gog

gateway:
  token:
    generate: true
    secretName: ""

env: {}

envFrom: []

fetchSecret: |
  #!/usr/bin/env node
  import { SecretsManagerClient, GetSecretValueCommand } from "@aws-sdk/client-secrets-manager";
  const input = JSON.parse(await new Response(process.stdin).text());
  const sm = new SecretsManagerClient({});
  const ns = process.env.TENANT_NAMESPACE;
  const result = {};
  for (const id of input.ids) {
    const { SecretString } = await sm.send(new GetSecretValueCommand({ SecretId: `openclaw/${ns}/${id}` }));
    result[id] = SecretString;
  }
  process.stdout.write(JSON.stringify(result));
