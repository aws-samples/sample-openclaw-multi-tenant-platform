<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="5">
<title>正在喚醒助理...</title>
<style>
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;color:#e0e0e0;font-family:system-ui,sans-serif}
.emoji{font-size:4rem;animation:pulse 2s ease-in-out infinite}
h1{font-size:1.4rem;font-weight:400;margin:.8rem 0 .4rem}
p{font-size:.85rem;color:#888}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
</style>
</head>
<body>
<div class="emoji">🦞</div>
<h1>正在喚醒你的助理...</h1>
<p>通常需要 15-30 秒</p>
</body>
</html>
