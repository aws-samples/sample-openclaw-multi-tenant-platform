<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenClaw Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--card:#111119;--border:#1e1e2e;--primary:#6366F1;--primary-hover:#5558e6;--text:#f0f0f5;--muted:#888;--success:#22c55e;--error:#ef4444;--input-bg:#0d0d15}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:400px;padding:1.5rem}
.brand{text-align:center;margin-bottom:2rem}
.brand h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.5px}
.brand p{color:var(--muted);font-size:0.9rem;margin-top:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:1.5rem}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.85rem;color:var(--muted);transition:all 0.15s}
.tab.active{background:var(--primary);color:#fff}
input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text);font-size:0.95rem;margin-bottom:10px;outline:none;transition:border 0.15s}
input:focus{border-color:var(--primary)}
input::placeholder{color:#555}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.15s;margin-top:4px}
.btn:hover{background:var(--primary-hover)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:0.85rem;display:none}
.msg.error{display:block;background:rgba(239,68,68,0.1);color:var(--error);border:1px solid rgba(239,68,68,0.2)}
.msg.success{display:block;background:rgba(34,197,94,0.1);color:var(--success);border:1px solid rgba(34,197,94,0.2)}
.msg.info{display:block;background:rgba(99,102,241,0.1);color:var(--primary);border:1px solid rgba(99,102,241,0.2)}
.footer{text-align:center;margin-top:1.5rem;color:#444;font-size:0.75rem}
#verify-section,#welcome-section{display:none}
#welcome-section{text-align:center}
.check{width:56px;height:56px;border-radius:50%;background:rgba(34,197,94,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1rem}
#welcome-section h2{font-size:1.25rem;margin-bottom:0.75rem}
#welcome-section p{color:var(--muted);line-height:1.6;font-size:0.9rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>OpenClaw</h1>
    <p>Enterprise AI Assistant</p>
  </div>
  <div class="card">
    <div id="auth-form">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Sign In</div>
        <div class="tab" onclick="switchTab('signup')">Sign Up</div>
      </div>
      <div id="msg" class="msg"></div>
      <form onsubmit="return handleSubmit(event)">
        <input type="email" id="email" placeholder="Email" required autocomplete="email">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="btn" id="submit-btn">Sign In</button>
      </form>
    </div>
    <div id="verify-section">
      <div id="verify-msg" class="msg info">Check your email for a verification code.</div>
      <form onsubmit="return handleVerify(event)">
        <input type="text" id="code" placeholder="Verification code" required autocomplete="one-time-code">
        <button type="submit" class="btn">Verify</button>
      </form>
    </div>
    <div id="welcome-section">
      <div class="check">✓</div>
      <h2>Account Created</h2>
      <p>Your account is pending admin approval. You will receive an email with your personal AI assistant URL once approved.</p>
    </div>
  </div>
  <div class="footer">Powered by Amazon EKS + Bedrock</div>
</div>
<script>
const CONFIG={region:'us-west-2',userPoolId:'',clientId:'',domain:''};
let currentTab='login',pendingEmail='';
function switchTab(t){currentTab=t;document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='signup')));document.getElementById('submit-btn').textContent=t==='login'?'Sign In':'Create Account';hideMsg()}
function showMsg(t,c){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+c}
function hideMsg(){document.getElementById('msg').className='msg'}
async function api(action,params){const r=await fetch(`https://cognito-idp.${CONFIG.region}.amazonaws.com/`,{method:'POST',headers:{'Content-Type':'application/x-amz-json-1.1','X-Amz-Target':`AWSCognitoIdentityProviderService.${action}`},body:JSON.stringify(params)});const d=await r.json();if(!r.ok)throw new Error(d.message||d.__type||'Request failed');return d}
async function handleSubmit(e){e.preventDefault();const email=document.getElementById('email').value,pw=document.getElementById('password').value,btn=document.getElementById('submit-btn');btn.disabled=true;try{if(currentTab==='signup'){await api('SignUp',{ClientId:CONFIG.clientId,Username:email,Password:pw,UserAttributes:[{Name:'email',Value:email}]});pendingEmail=email;document.getElementById('auth-form').style.display='none';document.getElementById('verify-section').style.display='block'}else{await api('InitiateAuth',{AuthFlow:'USER_PASSWORD_AUTH',ClientId:CONFIG.clientId,AuthParameters:{USERNAME:email,PASSWORD:pw}});const tenant=email.split('@')[0].toLowerCase().replace(/[^a-z0-9-]/g,'').slice(0,20);window.location.href=`https://${tenant}.${CONFIG.domain}`}}catch(err){showMsg(err.message,'error')}btn.disabled=false}
async function handleVerify(e){e.preventDefault();try{await api('ConfirmSignUp',{ClientId:CONFIG.clientId,Username:pendingEmail,ConfirmationCode:document.getElementById('code').value});document.getElementById('verify-section').style.display='none';document.getElementById('welcome-section').style.display='block'}catch(err){document.getElementById('verify-msg').textContent=err.message;document.getElementById('verify-msg').className='msg error'}}
</script>
</body>
</html>
