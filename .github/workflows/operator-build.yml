name: Operator Image

on:
  push:
    branches: [main]
    paths: ['operator/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-tenant-operator

jobs:
  # Check if self-hosted runners are available
  check-runners:
    name: "Check runner availability"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      has-self-hosted: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        run: |
          # Check via GitHub API if self-hosted runners are online
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/runners")
          if ! echo "$RESPONSE" | jq -e '.runners' >/dev/null 2>&1; then
            echo "Failed to query runners API or invalid response"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUNNERS=$(echo "$RESPONSE" | jq '[.runners[] | select(.status=="online")] | length')
          echo "Online runners: $RUNNERS"
          echo "available=$( [ "${RUNNERS:-0}" -ge 2 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

  # === Fast path: native build on self-hosted runners ===
  build-arm64-native:
    name: "Build arm64 (native)"
    needs: check-runners
    if: needs.check-runners.outputs.has-self-hosted == 'true' && github.repository_owner == 'snese'
    runs-on: [self-hosted, linux, ARM64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: operator
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

  build-amd64-native:
    name: "Build amd64 (native)"
    needs: check-runners
    if: needs.check-runners.outputs.has-self-hosted == 'true' && github.repository_owner == 'snese'
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: operator
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max

  merge-native:
    name: "Merge manifest (native)"
    runs-on: ubuntu-latest
    needs: [build-arm64-native, build-amd64-native]
    timeout-minutes: 5
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Verify arch images exist
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64"
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64"
      - name: Create multi-arch manifest
        run: |
          while IFS= read -r TAG; do
            docker buildx imagetools create -t "$TAG" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64"
          done <<< "${{ steps.meta.outputs.tags }}"

  # === Fallback: QEMU cross-compile on GitHub-hosted runner ===
  build-fallback:
    name: "Build multi-arch (QEMU fallback)"
    needs: check-runners
    if: needs.check-runners.outputs.has-self-hosted != 'true' || github.repository_owner != 'snese'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
