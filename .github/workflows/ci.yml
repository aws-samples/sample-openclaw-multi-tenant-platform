name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# From kube-rs: cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read

jobs:
  # ============================================================
  # Rust: fast checks (every PR) ~3 min
  # ============================================================
  rust-lint-test:
    name: "Rust: lint + test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: operator

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --lib --all-features

      - name: CRD generation verify
        run: |
          cargo run --bin crdgen > /tmp/crd-generated.yaml
          diff -u yaml/crd.yaml /tmp/crd-generated.yaml || { echo "CRD out of date"; exit 1; }

  # ============================================================
  # Rust: cargo-deny (every PR, parallel) ~1 min
  # License compliance + security advisory audit
  # ============================================================
  rust-deny:
    name: "Rust: license + advisory audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: operator/Cargo.toml

  # ============================================================
  # Rust: heavy checks (merge to main only) ~8 min
  # ============================================================
  rust-integration:
    name: "Rust: K8s integration"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: false
    needs: rust-lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: operator

      - name: Build release binary
        working-directory: operator
        run: cargo build --release --bin tenant-operator

      - name: Create k3d cluster
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d cluster create test --no-lb --k3s-arg "--disable=traefik@server:0" --image rancher/k3s:v1.32.4-k3s1
          kubectl cluster-info

      - name: Install CRD and run operator
        run: |
          kubectl apply -f operator/yaml/crd.yaml
          kubectl wait --for=condition=Established crd/tenants.openclaw.io --timeout=30s
          operator/target/release/tenant-operator &
          sleep 5
          curl -sf http://localhost:8080/health | jq .

      - name: Create and verify tenant
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: openclaw.io/v1alpha1
          kind: Tenant
          metadata:
            name: test-alice
            namespace: default
          spec:
            email: alice@example.com
            displayName: Alice
            skills: [weather]
            budget: { monthlyUSD: 50 }
            enabled: true
          EOF
          for i in $(seq 1 30); do
            PHASE=$(kubectl get tenant test-alice -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            [ "$PHASE" = "Ready" ] && echo "Tenant ready" && break
            sleep 2
          done
          kubectl get ns openclaw-test-alice
          kubectl get pvc test-alice-data -n openclaw-test-alice
          kubectl get sa test-alice -n openclaw-test-alice

      - name: Test deletion cleanup
        run: |
          kubectl delete tenant test-alice
          sleep 15
          kubectl get ns openclaw-test-alice 2>&1 | grep -q "not found\|Terminating"

  rust-docker:
    name: "Rust: Docker build"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: rust-lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        working-directory: operator
        run: docker build -t tenant-operator:test .

  # ============================================================
  # Platform: CDK + Helm + Scripts (every PR) ~2 min
  # ============================================================
  platform-lint:
    name: "Platform: CDK + Helm + Scripts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: CDK compile
        working-directory: cdk
        run: npm ci && npx tsc --noEmit

      - name: CDK synth
        working-directory: cdk
        run: |
          cp cdk.json.example cdk.json
          npx cdk synth --no-staging 2>&1 | tee /tmp/synth.log || true
          if grep -q 'Error:' /tmp/synth.log && ! grep -q '\[Error at' /tmp/synth.log; then
            echo "::error::CDK synth failed (not cdk-nag)"
            exit 1
          fi
          echo "::group::cdk-nag findings"
          grep -c '\\[Error' /tmp/synth.log && echo "cdk-nag errors found (non-blocking for sample code)" || echo "No cdk-nag errors"
          echo "::endgroup::"

      - name: Helm lint
        run: helm lint helm/charts/openclaw-platform/ --set ingress.enabled=true --set ingress.host=test.example.com --set tenant.name=test

      - name: Python syntax
        run: |
          python3 -m py_compile cdk/lambda/pre-signup/index.py
          python3 -m py_compile cdk/lambda/post-confirmation/index.py
          python3 -m py_compile cdk/lambda/cost-enforcer/index.py

      - name: Shell syntax
        run: for f in scripts/*.sh; do bash -n "$f"; done

      - name: ShellCheck
        run: shellcheck --severity=error scripts/*.sh

  # ============================================================
  # Security (every PR) ~1 min
  # ============================================================
  security-scan:
    name: "Security scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No hardcoded secrets
        run: |
          FOUND=$(grep -rn 'AKIA[A-Z0-9]\\{16\\}' --include="*.ts" --include="*.py" --include="*.sh" --include="*.rs" --include="*.yaml" --include="*.md" 2>/dev/null | grep -v node_modules | grep -v ".git/" | grep -v target/ | grep -v cdk.out | grep -v cdk.json || true)
          [ -n "$FOUND" ] && echo "$FOUND" && exit 1 || echo "Clean"

      - name: No CJK in code
        run: |
          python3 << 'PYEOF'
          import glob, os
          found = []
          for ext in ['*.ts', '*.py', '*.rs', '*.html']:
              for f in glob.glob(f'**/{ext}', recursive=True):
                  if any(x in f for x in ['node_modules','cdk.out','.git','target/']): continue
                  try:
                      with open(f) as fh:
                          for i, line in enumerate(fh, 1):
                              if any('\u4e00' <= c <= '\u9fff' for c in line):
                                  found.append(f'{f}:{i}')
                  except: pass
          if found:
              print(f'Found CJK in {len(found)} lines:')
              for f in found[:10]: print(f'  {f}')
              exit(1)
          print('Clean')
          PYEOF

      - name: No sensitive data in commit messages
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          COMMITS=$(git log --format='%B' origin/main..HEAD 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "Could not determine commit range, skipping"
            exit 0
          fi
          FOUND=$(echo "$COMMITS" | grep -iE '[0-9]{12}\\.dkr\\.ecr|AKIA[A-Z0-9]{16}|[a-z0-9]{10,}\\.cloudfront\\.net|arn:aws:' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Commit messages contain sensitive data:"
            echo "$FOUND"
            exit 1
          fi
          echo "Clean"

      - name: npm audit
        working-directory: cdk
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high 2>&1 || true

      - name: Semgrep (JS/TS/Python)
        run: |
          pip3 install semgrep==1.156.0 --quiet
          set +e
          semgrep scan --config auto --severity ERROR --severity WARNING --error .
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Semgrep: no findings"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "::warning::Semgrep found issues (non-blocking for sample code)"
          else
            echo "::error::Semgrep crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Install Trivy
        run: |
          TRIVY_VERSION="0.69.3"
          TRIVY_SHA256="1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
          tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Trivy config scan (Dockerfile, Helm, K8s YAML)
        run: trivy config --severity HIGH,CRITICAL --exit-code 0 .

      - name: Trivy filesystem scan (dependencies)
        run: trivy fs --severity HIGH,CRITICAL --exit-code 0 .

  # ============================================================
  # CodeQL — DISABLED
  # Requires GitHub Advanced Security (GHAS), not available on
  # private repos with GitHub Free plan. Re-enable if repo goes
  # public or org upgrades to GHAS.
  # ============================================================
