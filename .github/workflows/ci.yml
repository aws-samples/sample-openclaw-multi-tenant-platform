name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: TypeScript compile check
        working-directory: cdk
        run: npx tsc --noEmit

      - name: CDK synth (validate templates)
        working-directory: cdk
        run: |
          cp cdk.json.example cdk.json
          npx cdk synth --no-staging 2>&1 || true
          # synth may fail due to placeholder values, but template generation should work

      - name: Helm lint
        run: |
          helm lint helm/charts/openclaw-platform/ \
            --set ingress.enabled=true \
            --set ingress.host=test.example.com \
            --set tenant.name=test

      - name: Shell script syntax check
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "✅ $f" || echo "❌ $f"
          done

      - name: No sensitive data check
        run: |
          MATCHES=$(grep -rn "387671391109\|snese\.net\|us-west-2_yRqDzKF0t\|103uif8rdrp29ak4eki7lc09ru" \
            --include="*.ts" --include="*.py" --include="*.md" --include="*.sh" --include="*.html" --include="*.yaml" \
            2>/dev/null | grep -v node_modules | grep -v cdk.out | grep -v ".git/" | grep -v cdk.json | wc -l)
          if [ "$MATCHES" -gt 0 ]; then
            echo "❌ Found $MATCHES sensitive data matches"
            exit 1
          fi
          echo "✅ No sensitive data found"

      - name: No CJK characters check
        run: |
          python3 -c "
          import glob
          total=0
          for f in glob.glob('**/*', recursive=True):
              if any(x in f for x in ['node_modules','cdk.out','.git','research/']): continue
              try:
                  with open(f) as fh:
                      for line in fh: total+=sum(1 for c in line if '\u4e00'<=c<='\u9fff')
              except: pass
          if total > 0:
              print(f'❌ Found {total} CJK characters')
              exit(1)
          print('✅ No CJK characters')
          "
