name: Enhanced CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================================
  # Auth UI Testing (NEW) ~3 min
  # ============================================================
  auth-ui-tests:
    name: "Auth UI: Unit + DOM + Contract Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: auth-ui/package-lock.json

      - name: Install auth-ui test dependencies
        working-directory: auth-ui
        run: npm ci

      - name: Auth UI unit tests
        working-directory: auth-ui
        run: npm test

      - name: DOM interaction tests
        working-directory: auth-ui
        run: npm run test:dom

      - name: Cognito API contract tests
        working-directory: auth-ui
        run: npm run test:contracts

      - name: Visual regression tests (optional)
        working-directory: auth-ui
        run: npm run test:visual || true

  # ============================================================
  # Infrastructure Contract Tests (NEW) ~2 min
  # ============================================================
  infrastructure-contracts:
    name: "Infrastructure: Contract + Config Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: CDK unit tests
        working-directory: cdk
        run: |
          npm ci
          npm test

      - name: Infrastructure contract tests
        working-directory: cdk
        run: npm run test:contracts

      - name: Configuration validation tests
        run: |
          # Test all example configurations
          ./scripts/validate-config.sh --test-mode

      - name: Cost estimation tests
        working-directory: cdk
        run: |
          cp cdk.json.example cdk.json
          npm run test:cost-estimation

  # ============================================================
  # Progressive Validation Tests (NEW) ~4 min
  # ============================================================
  progressive-validation:
    name: "Progressive: Environment + Config + Deployment Readiness"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Level 1 - Environment simulation
        run: |
          # Simulate preflight checks without real AWS
          ./scripts/lib/preflight.sh --mock-mode

      - name: Level 2 - Configuration validation
        run: |
          # Test various config scenarios
          ./scripts/lib/validate-config.sh --all-scenarios

      - name: Level 3 - Deployment readiness
        working-directory: cdk
        run: |
          npm ci
          # Test CDK synth with various configurations
          ./test-deployment-readiness.sh

      - name: Level 4 - Contract verification
        run: |
          # Verify all service contracts are defined
          ./scripts/verify-contracts.sh

  # ============================================================
  # Multi-Region Configuration Tests (NEW) ~2 min
  # ============================================================
  multi-region-config:
    name: "Multi-Region: Configuration Isolation Tests"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scenario:
          - { region: "us-east-1", domain: "false", name: "no-domain" }
          - { region: "us-west-2", domain: "claw.snese.net", name: "custom-domain" }
          - { region: "eu-west-1", domain: "false", name: "eu-no-domain" }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Test ${{ matrix.scenario.name }} configuration
        run: |
          # Generate region-specific config
          ./scripts/generate-region-config.sh \
            --region ${{ matrix.scenario.region }} \
            --domain "${{ matrix.scenario.domain }}" \
            --test-mode

      - name: Validate configuration isolation
        working-directory: cdk
        run: |
          npm ci
          # Ensure no cross-region contamination
          ./validate-config-isolation.sh ${{ matrix.scenario.region }}

  # ============================================================
  # Keep existing jobs (modified names for clarity)
  # ============================================================
  platform-lint:
    name: "Platform: CDK + Helm + Scripts (existing)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      # ... (keep existing steps exactly as they are)
      - name: CDK compile
        working-directory: cdk
        run: npm ci && npx tsc --noEmit
      # ... rest of existing steps

  security-scan:
    name: "Security: Static Analysis (existing)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # ... (keep existing security steps)

  # ============================================================
  # Test Results Aggregation (NEW)
  # ============================================================
  test-summary:
    name: "Test Summary & Documentation Update"
    runs-on: ubuntu-latest
    needs: [auth-ui-tests, infrastructure-contracts, progressive-validation, multi-region-config, platform-lint, security-scan]
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate test coverage report
        run: |
          echo "## Test Coverage Report" > test-summary.md
          echo "- ✅ Auth UI Tests: ${{ needs.auth-ui-tests.result }}" >> test-summary.md
          echo "- ✅ Infrastructure Contracts: ${{ needs.infrastructure-contracts.result }}" >> test-summary.md
          echo "- ✅ Progressive Validation: ${{ needs.progressive-validation.result }}" >> test-summary.md
          echo "- ✅ Multi-Region Config: ${{ needs.multi-region-config.result }}" >> test-summary.md
          echo "- ✅ Platform Lint: ${{ needs.platform-lint.result }}" >> test-summary.md
          echo "- ✅ Security Scan: ${{ needs.security-scan.result }}" >> test-summary.md

      - name: Update documentation badges
        if: github.ref == 'refs/heads/main'
        run: |
          # Update README badges based on test results
          ./scripts/update-test-badges.sh

      - name: Post PR comment with test summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Automated Test Results\n\n${summary}`
            });