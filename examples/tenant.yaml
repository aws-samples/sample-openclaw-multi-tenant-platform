# Example: Tenant Custom Resource
#
# Apply with: kubectl apply -f examples/tenant.yaml
# Check status: kubectl get tenant example -n openclaw-system -o yaml
#
# The Operator reconciles this into:
#   1. Namespace (openclaw-example)
#   2. ArgoCD Application (syncs Helm chart)
#   3. ReferenceGrant (if scaleToZero enabled)
#
# Status phases: Provisioning → Ready (or Error)
#
# CRD reference: operator/yaml/crd.yaml
# Required fields: email, displayName

apiVersion: openclaw.io/v1alpha1
kind: Tenant
metadata:
  name: example
  namespace: openclaw-system
spec:
  # Required: workspace owner email
  email: "user@example.com"

  # Required: human-readable display name
  displayName: "OpenClaw"

  # Optional: custom container image override
  # When omitted, uses the Helm chart default (Chart.AppVersion)
  # image:
  #   repository: "ghcr.io/openclaw/openclaw"
  #   tag: "2026.3.24"
  #   pullPolicy: "IfNotPresent"

  # Optional: skill packages to install (default: [])
  # skills:
  #   - weather
  #   - gog

  # Optional: keep pod running 24/7, skip scale-to-zero (default: false)
  # Useful for tenants with cron jobs that need the pod always available
  # alwaysOn: false

  # Optional: monthly budget in USD
  # budget:
  #   monthlyUSD: 100

  # Optional: extra environment variables
  # env:
  #   MY_VAR: "my-value"
