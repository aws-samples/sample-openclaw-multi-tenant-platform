apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-landing
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/group.name: openclaw-shared
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-west-2:<AWS_ACCOUNT_ID>:certificate/<ACM_CERTIFICATE_ID>"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/actions.landing: |
      {"type":"fixed-response","fixedResponseConfig":{"contentType":"text/html","statusCode":"200","messageBody":"<html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>OpenClaw</title><style>body{background:#1a1a2e;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}div{text-align:center}h1{font-size:3em;margin:0}p{color:#ccc;margin:1em 0}a{background:#e94560;color:#fff;padding:12px 32px;border-radius:8px;text-decoration:none;font-weight:bold;display:inline-block}a:hover{background:#c73652}small{color:#666;display:block;margin-top:2em}</style></head><body><div><h1>OpenClaw</h1><p>Enterprise AI Assistant Platform</p><a href=https://<COGNITO_DOMAIN>.auth.us-west-2.amazoncognito.com/signup?client_id=<COGNITO_CLIENT_ID>&response_type=code&scope=openid+email+profile&redirect_uri=https://<YOUR_DOMAIN>/oauth2/idpresponse>Get Started</a><small>Powered by Amazon EKS + Bedrock</small></div></body></html>"}}
spec:
  ingressClassName: alb
  rules:
    - host: <YOUR_DOMAIN>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing
                port:
                  name: use-annotation
