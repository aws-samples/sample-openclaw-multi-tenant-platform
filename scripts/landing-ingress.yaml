apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-landing
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/group.name: openclaw-shared
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-west-2:387671391109:certificate/9eba6ce2-9ebd-4b38-bd42-e7b92305b588"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/actions.landing: |
      {"type":"fixed-response","fixedResponseConfig":{"contentType":"text/html","statusCode":"200","messageBody":"<!DOCTYPE html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>OpenClaw Platform</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh}.c{text-align:center;max-width:480px;padding:2rem}.e{font-size:4rem}.t{font-size:2rem;margin:.5rem 0}.s{color:#ccc;margin:1rem 0;line-height:1.6}a{display:inline-block;background:#e94560;color:#fff;padding:.8rem 2rem;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:1rem}a:hover{background:#c73652}.f{color:#666;margin-top:2rem;font-size:.8rem}</style></head><body><div class=c><div class=e>\uD83E\uDD9E</div><div class=t>OpenClaw Platform</div><p class=s>Enterprise AI assistant platform.<br>Each user gets an isolated, private AI workspace powered by Amazon Bedrock.</p><a href='https://claw-snese.auth.us-west-2.amazoncognito.com/signup?client_id=103uif8rdrp29ak4eki7lc09ru&response_type=code&scope=openid+email+profile&redirect_uri=https://claw.snese.net/oauth2/idpresponse'>Get Started</a><p class=f>Powered by Amazon EKS + Bedrock</p></div></body></html>"}}
spec:
  ingressClassName: alb
  rules:
    - host: claw.snese.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing
                port:
                  name: use-annotation
