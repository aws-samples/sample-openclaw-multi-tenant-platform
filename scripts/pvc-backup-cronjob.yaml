apiVersion: v1
kind: ServiceAccount
metadata:
  name: pvc-backup
  namespace: kube-system
  annotations:
    # Replace with your IAM role ARN that has ec2:CreateSnapshot, ec2:DeleteSnapshot, ec2:DescribeSnapshots, ec2:CreateTags
    eks.amazonaws.com/role-arn: "arn:aws:iam::role/openclaw-pvc-backup"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-backup
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pvc-backup
subjects:
  - kind: ServiceAccount
    name: pvc-backup
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openclaw-pvc-backup
  namespace: kube-system
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: pvc-backup
          restartPolicy: Never
          # checkov:skip=CKV_K8S_38: CronJob uses kubectl + aws-cli, requires SA token
          # checkov:skip=CKV_K8S_43: Image tag pinned to minor version, digest changes on every release
          automountServiceAccountToken: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: amazon/aws-cli:2.27.0
              imagePullPolicy: Always
              securityContext:
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 256Mi
              volumeMounts:
              - name: tmp
                mountPath: /tmp
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  DATE=$(date +%Y-%m-%d)
                  REGION="${AWS_DEFAULT_REGION:-us-west-2}"

                  # Install kubectl with checksum verification
                  KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
                  curl -sLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
                  curl -sLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
                  echo "$(cat kubectl.sha256)  kubectl" | sha256sum -c -
                  install kubectl /tmp/kubectl && rm kubectl kubectl.sha256
                  export PATH="/tmp:$PATH"

                  # Get all openclaw PVCs
                  PVCS=$(kubectl get pvc -A -l app.kubernetes.io/name=openclaw-helm -o json)
                  COUNT=$(echo "$PVCS" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())['items']))")
                  echo "Found $COUNT PVCs"

                  echo "$PVCS" | python3 -c "
                  import sys, json
                  items = json.loads(sys.stdin.read())['items']
                  for i in items:
                      ns = i['metadata']['namespace']
                      vol = i['spec']['volumeName']
                      print(f'{ns} {vol}')
                  " | while read NS PV_NAME; do
                    # Get EBS volume ID from PV
                    VOL_ID=$(kubectl get pv "$PV_NAME" -o jsonpath='{.spec.csi.volumeHandle}')
                    if [ -z "$VOL_ID" ]; then
                      echo "SKIP: No EBS volume for PV $PV_NAME (ns=$NS)"
                      continue
                    fi
                    echo "Snapshot: $VOL_ID (ns=$NS)"
                    aws ec2 create-snapshot \
                      --region "$REGION" \
                      --volume-id "$VOL_ID" \
                      --description "openclaw-backup-${NS}-${DATE}" \
                      --tag-specifications "ResourceType=snapshot,Tags=[{Key=Name,Value=openclaw-backup-${NS}},{Key=openclaw/namespace,Value=${NS}},{Key=openclaw/backup,Value=true}]"
                  done

                  # Cleanup snapshots older than 7 days
                  CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%S)
                  echo "Deleting snapshots before $CUTOFF"
                  OLD=$(aws ec2 describe-snapshots \
                    --region "$REGION" \
                    --owner-ids self \
                    --filters "Name=tag:openclaw/backup,Values=true" \
                    --query "Snapshots[?StartTime<'${CUTOFF}'].SnapshotId" \
                    --output text)
                  for SNAP_ID in $OLD; do
                    echo "Delete: $SNAP_ID"
                    aws ec2 delete-snapshot --region "$REGION" --snapshot-id "$SNAP_ID"
                  done
                  echo "Done"
          volumes:
          - name: tmp
            emptyDir: {}
