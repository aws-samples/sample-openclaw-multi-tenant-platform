apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-updater
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-updater
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-updater
subjects:
  - kind: ServiceAccount
    name: image-updater
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openclaw-image-updater
  namespace: kube-system
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: image-updater
          restartPolicy: Never
          # checkov:skip=CKV_K8S_38: CronJob uses kubectl to patch deployments, requires SA token
          # checkov:skip=CKV_K8S_43: Image tag pinned to minor version, digest changes on every release
          automountServiceAccountToken: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: updater
              image: bitnami/kubectl:1.35.0
              imagePullPolicy: Always
              securityContext:
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: "1"
                  memory: 128Mi
              env:
                - name: ECR_REPO
                  value: "ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ghcr/openclaw/openclaw"
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  REPO="${ECR_REPO}"
                  
                  CURRENT=$(kubectl get deploy -A -l app.kubernetes.io/name=openclaw-helm \
                    -o jsonpath='{.items[0].spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
                  
                  if [ -z "$CURRENT" ]; then
                    echo "No openclaw deployments found"
                    exit 0
                  fi
                  
                  CURRENT_TAG="${CURRENT##*:}"
                  echo "Current: $CURRENT_TAG"
                  
                  TOKEN=$(wget -qO- "https://ghcr.io/token?scope=repository:openclaw/openclaw:pull" | sed 's/.*"token":"\([^"]*\)".*/\1/')
                  LATEST=$(wget -qO- --header="Authorization: Bearer $TOKEN" "https://ghcr.io/v2/openclaw/openclaw/tags/list" | sed 's/.*\[//;s/\].*//;s/"//g' | tr ',' '\n' | grep -E '^[0-9]{4}\.' | sort -V | tail -1)
                  
                  echo "Latest:  $LATEST"
                  
                  if [ "$CURRENT_TAG" = "$LATEST" ]; then
                    echo "Already up to date"
                    exit 0
                  fi
                  
                  echo "Updating all tenants: $CURRENT_TAG -> $LATEST"
                  kubectl set image deploy -l app.kubernetes.io/name=openclaw-helm \
                    --all-namespaces "main=${REPO}:${LATEST}"
                  echo "Done"
