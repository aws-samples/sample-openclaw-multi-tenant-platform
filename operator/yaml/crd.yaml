apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.openclaw.io
spec:
  group: openclaw.io
  names:
    categories: []
    kind: Tenant
    plural: tenants
    shortNames:
    - tn
    singular: tenant
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.email
      name: Email
      type: string
    - jsonPath: .spec.budget.monthlyUSD
      name: Budget
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for TenantSpec via `CustomResource`
        properties:
          spec:
            description: Tenant CRD spec — the desired state for one OpenClaw tenant
            properties:
              budget:
                description: Budget configuration
                nullable: true
                properties:
                  monthlyUSD:
                    default: 100
                    description: Monthly spend cap in USD
                    format: int64
                    type: integer
                type: object
              displayName:
                description: Human-readable display name
                type: string
              email:
                description: Tenant email, must be unique across the cluster
                type: string
              emoji:
                description: Emoji identifier for dashboards and logs
                nullable: true
                type: string
              enabled:
                default: true
                description: Whether the tenant is active. False suspends the tenant.
                type: boolean
              env:
                additionalProperties:
                  type: string
                description: Extra environment variables injected into the main container
                nullable: true
                type: object
              image:
                description: Container image override (defaults to Operator env OPENCLAW_IMAGE)
                nullable: true
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: 'Pull policy (default: IfNotPresent)'
                    type: string
                  repository:
                    description: Image repository (defaults to Operator OPENCLAW_IMAGE env)
                    nullable: true
                    type: string
                  tag:
                    description: Image tag override
                    nullable: true
                    type: string
                type: object
              resources:
                description: Pod resource requests and limits
                nullable: true
                properties:
                  limits:
                    description: CPU and memory specification
                    nullable: true
                    properties:
                      cpu:
                        nullable: true
                        type: string
                      memory:
                        nullable: true
                        type: string
                    type: object
                  requests:
                    description: CPU and memory specification
                    nullable: true
                    properties:
                      cpu:
                        nullable: true
                        type: string
                      memory:
                        nullable: true
                        type: string
                    type: object
                type: object
              skills:
                default: []
                description: List of enabled skill names
                items:
                  type: string
                type: array
            required:
            - displayName
            - email
            type: object
          status:
            description: Status subresource for Tenant
            nullable: true
            properties:
              conditions:
                default: []
                description: Status conditions following K8s conventions
                items:
                  properties:
                    message:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              phase:
                default: ''
                description: 'Current phase: Pending, Provisioning, Ready, Suspended, Error'
                type: string
            type: object
        required:
        - spec
        title: Tenant
        type: object
    served: true
    storage: true
    subresources:
      status: {}
