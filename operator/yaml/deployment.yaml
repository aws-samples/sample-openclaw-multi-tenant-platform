apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-operator
  namespace: openclaw-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-operator
rules:
  - apiGroups: ["openclaw.io"]
    resources: ["tenants", "tenants/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.k8s.aws"]
    resources: ["targetgroupconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-operator
subjects:
  - kind: ServiceAccount
    name: tenant-operator
    namespace: openclaw-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-operator
  namespace: openclaw-system
  labels:
    app: tenant-operator
  annotations:
    checkov.io/skip1: CKV2_K8S_6=NetworkPolicy for openclaw-system managed by CDK Pod Security Standards
    checkov.io/skip2: CKV_K8S_38=Operator requires SA token for K8s API access (kube-rs client)
    checkov.io/skip3: CKV_K8S_43=Image tag set dynamically by setup.sh sed substitution (commit SHA from CI)
    checkov.io/skip4: CKV_K8S_14=Image tag set dynamically by setup.sh sed substitution (commit SHA from CI)
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-operator
  template:
    metadata:
      labels:
        app: tenant-operator
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
    spec:
      serviceAccountName: tenant-operator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tenant-operator
          image: ghcr.io/snese/openclaw-tenant-operator:latest  # Pulled via ECR pull-through cache
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: AWS_REGION
              value: "REGION"
            - name: GATEWAY_DOMAIN
              value: "DOMAIN"
            - name: COGNITO_POOL_ARN
              value: "COGNITO_POOL_ARN"
            - name: COGNITO_CLIENT_ID
              value: "COGNITO_CLIENT_ID"
            - name: COGNITO_DOMAIN
              value: "COGNITO_DOMAIN"
            - name: HELM_REPO_URL
              value: "https://github.com/ORG/REPO.git"
            - name: HELM_TARGET_REVISION
              value: "main"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
